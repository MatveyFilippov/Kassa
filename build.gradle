plugins {
    id 'java'
    id 'application'
}

group = 'homer.tastyworld'
version = '1.0.0'

repositories {
    mavenCentral()
}

dependencies {
    implementation "com.hynnet:jacob:1.18"
    implementation 'org.slf4j:slf4j-api:1.7.36'
    implementation 'ch.qos.logback:logback-classic:1.2.11'
}

application {
    mainClass = 'homer.tastyworld.Main'
    // Автоматически добавляем папку с DLL в java.library.path при запуске
    applicationDefaultJvmArgs = [
            "-Djava.library.path=./src/main/resources/dll"
    ]
}

// Копируем DLL в папку сборки
tasks.register('copyDll', Copy) {
    from 'src/main/resources/dll'
    into 'build/libs'
    include '*.dll'
}

build.dependsOn copyDll
